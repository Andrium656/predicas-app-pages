<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sermons Hub</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#4338ca 0%,#6d28d9 100%); color:#fff;
    text-align:center; padding:32px;
  }
  .badge{
    display:inline-block; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
    background:rgba(255,255,255,.16); padding:6px 14px; border-radius:999px; margin-bottom:20px;
  }
  h1{margin:0 0 10px; font-size:2.2rem}
  p{margin:0 0 30px; opacity:.92; font-size:1.05rem; max-width:460px}
  .links{display:flex; gap:14px; flex-wrap:wrap; justify-content:center}
  a.card{
    display:block; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
    color:#fff; text-decoration:none; padding:18px 30px; border-radius:14px; font-weight:600;
    min-width:180px; transition:.15s;
  }
  a.card:hover{background:rgba(255,255,255,.22); transform:translateY(-2px)}
  a.card span{display:block; font-weight:400; font-size:.85rem; opacity:.8; margin-top:4px}
  footer{margin-top:40px; font-size:.82rem; opacity:.7}
</style>
</head>
<body>
  <div class="badge">Sermons Hub</div>
  <h1>Sermons Hub</h1>
  <p>Sermones, bosquejos y estudios bíblicos en audio y texto, con tu Biblia y el versículo del día.</p>
  <div class="links">
    <a class="card" href="privacy/">Política de Privacidad<span>Privacy Policy</span></a>
    <a class="card" href="support/">Soporte<span>Support &amp; Help</span></a>
  </div>
  <footer>© 2026 Sermons Hub</footer>
</body>
</html>
